# Gopkg.lock — dep lock file (auto-generated by `dep ensure`)
# DO NOT edit this file by hand. It is managed by `dep`.
# It records the exact revisions of all direct and transitive dependencies
# so that builds are perfectly reproducible across machines.

# Each [[projects]] entry represents one resolved dependency:
#   name     — canonical import path of the root package
#   packages — list of sub-packages actually imported (["." means the root])
#   revision — the exact git commit SHA that was fetched
#   version  — the human-readable tag that resolved to `revision`

[[projects]]
  name     = "github.com/fatih/color"
  packages = ["."]
  revision = "5b77d2a35fb0ede96d138fc9a99b60f3b4ce0a4f"
  version  = "v1.7.0"

[[projects]]
  name     = "github.com/mattn/go-colorable"
  packages = ["."]
  revision = "167de6bfdfba052fa6b2d3664c8f5272e23e9a8d"
  version  = "v0.0.9"

[[projects]]
