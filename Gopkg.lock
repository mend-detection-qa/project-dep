  packages = ["."]
  revision = "fc9e8d8ef48496124e79ae0df75490096eccf6fe"
  version  = "v0.0.3"

[solve-meta]
  # analyzer-name and analyzer-version identify which dep solver produced
  # this lock file, so dep can detect staleness.
  analyzer-name    = "dep"
  analyzer-version = 1
  # inputs-digest is a hash of Gopkg.toml + the import graph. If it changes,
  # `dep ensure` knows the lock is out of date.
  inputs-digest    = "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
